{% extends 'accounts/base.html' %}
{% block title %}Change Password{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-box">
        <h2>🔒 Change Password</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Update Password</button>
        </form>
        <p><a href="{% url 'settings' %}">← Back to Settings</a></p>
    </div>
</div>
{% endblock %}
