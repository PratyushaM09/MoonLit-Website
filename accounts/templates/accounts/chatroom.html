{% extends 'accounts/base.html' %}
{% block title %}Chat - {{ group_name|title }}{% endblock %}
{% block body_class %}chat-body{% endblock %}

{% block content %}
<div class="chat-page">
  <header class="chat-header">
    <h2>💬 {{ group_name|title }} Chat</h2>
    <a href="{% url 'home' %}" class="back-btn">← Back to Dashboard</a>
  </header>

  <div class="chat-container">
    <div class="chat-box" id="chat-box">
      <!-- Messages go here -->
    </div>
    <form id="chat-form">
      <input type="text" id="chat-message-input" placeholder="Type a message..." autocomplete="off" />
      <button type="submit">Send</button>
    </form>
  </div>
</div>
{% endblock %}
