<!-- GOALS PANEL -->
<div class="panel goals-panel">

  <!-- Left: Goal Categories -->
  <div class="goal-left">
      <h2 class="panel-title neon-blue">Goals</h2>
      <div class="task-period active" data-category="Coding">Coding</div>
      <div class="task-period" data-category="College">College</div>
      <div class="task-period" data-category="Project">Project</div>
      <div class="task-period" data-category="Personal">Personal</div>

      <button id="add-category-btn" class="cat-btn">+ Add Category</button>
      <button id="add-goal-btn" class="cat-btn">+ Add Goal</button>
  </div> <!-- 🔹 CLOSE goal-left -->

  <!-- Right: Goal List -->
  <div class="goal-right">
      <div class="goal-list" id="goal-list">
          <!-- Dynamic goals will be rendered here -->
      </div>
  </div>

</div> <!-- 🔹 CLOSE panel.goals-panel -->

<!-- Goal Modal -->
<div id="goal-modal" class="modal hidden">
  <div class="modal-content">
    <h3 id="modal-title">Add Goal</h3>
    <label>Title:</label>
    <input type="text" id="goal-title" placeholder="Enter goal title">
    <label>Progress (%):</label>
    <input type="number" id="goal-progress" min="0" max="100">
    <label>Tasks (comma separated):</label>
    <input type="text" id="goal-tasks" placeholder="e.g. Core Syntax, OOP">
    <div style="margin-top: 15px;">
      <button id="save-goal-btn" class="time-btn save-btn">Save</button>
      <button id="cancel-goal-btn" class="time-btn cancel-btn">Cancel</button>
    </div>
  </div>
</div>
